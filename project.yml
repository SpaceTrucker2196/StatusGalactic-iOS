name: StatusGalactic

options:
  bundleIdPrefix: io.river.statusgalactic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""

targets:
  StatusGalactic:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StatusGalactic
    dependencies:
      - target: StatusGalacticWidget
    info:
      path: StatusGalactic/App/Info.plist
      properties:
        CFBundleDisplayName: Status Galactic
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        NSLocationWhenInUseUsageDescription: >-
          Status Galactic uses your location to build a Galactic Weather Report
          for where you are right now.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: io.river.statusgalactic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO

  StatusGalacticWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StatusGalactic/Models/Brief.swift
      - path: StatusGalactic/Services/ClientConfig.swift
      - path: StatusGalactic/Services/Brief
      - path: StatusGalactic/Services/Astronomy
      - path: StatusGalacticWidget
    info:
      path: StatusGalacticWidget/Info.plist
      properties:
        CFBundleDisplayName: Status Galactic
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.statusgalactic.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  StatusGalacticWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: StatusGalactic/Models/Brief.swift
      - path: StatusGalactic/Services/ClientConfig.swift
      - path: StatusGalactic/Services/LocationManager.swift
      - path: StatusGalactic/Services/Brief
      - path: StatusGalactic/Services/Astronomy
      - path: StatusGalacticWatch
    info:
      path: StatusGalacticWatch/Info.plist
      properties:
        CFBundleDisplayName: Status Galactic
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKWatchOnly: true
        NSLocationWhenInUseUsageDescription: >-
          Status Galactic uses your location to build a Galactic Weather Report
          for where you are right now.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.statusgalactic.watch
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: StatusGalacticWatchComplications

  StatusGalacticWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: StatusGalactic/Models/Brief.swift
      - path: StatusGalactic/Services/ClientConfig.swift
      - path: StatusGalactic/Services/Brief
      - path: StatusGalactic/Services/Astronomy
      - path: StatusGalacticWatchComplications
    info:
      path: StatusGalacticWatchComplications/Info.plist
      properties:
        CFBundleDisplayName: Status Galactic
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.statusgalactic.watch.complications
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  StatusGalacticTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StatusGalacticTests
    dependencies:
      - target: StatusGalactic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.statusgalactic.tests
        GENERATE_INFOPLIST_FILE: YES
