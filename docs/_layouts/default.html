<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#02050F">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/vaporwave.css' | relative_url }}">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-scanlines" aria-hidden="true"></div>
  <div class="bg-stars" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark" aria-hidden="true">◍</span>
      <span class="brand-name">GALACTIC</span>
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/support' | relative_url }}">Support</a>
      <a href="{{ '/privacy' | relative_url }}">Privacy</a>
      <a href="https://github.com/SpaceTrucker2196/StatusGalactic-iOS" rel="noopener">GitHub</a>
    </nav>
  </header>

  <main class="page">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p class="footer-line">// transmission ends — de SpaceTrucker</p>
    <p class="footer-line muted">© 2026 · MIT · No tracking · No accounts · No backend</p>
  </footer>
</body>
</html>
