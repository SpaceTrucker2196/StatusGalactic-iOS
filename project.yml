name: StatusGalactic

options:
  bundleIdPrefix: com.spacetrucker.statusgalactic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: "U3Z59VXPUB"

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.28.0"

targets:
  StatusGalactic:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StatusGalactic
        excludes:
          # Vendored Meshtastic .proto schema files + NOTICE — used only by
          # the protoc generation step, not the Swift build. Generated
          # *.pb.swift under Services/Meshtastic/Generated/ IS compiled.
          - "Services/Meshtastic/proto/**"
      # Share the widget body + entry struct + WidgetConfig (which
      # BriefWidgetProvider references) so the in-app screenshot
      # preview can render the medium widget on a faux home screen
      # (XCUITest can't drive SpringBoard to capture the real widget).
      - path: StatusGalacticWidget/BriefWidgetView.swift
      - path: StatusGalacticWidget/BriefWidgetProvider.swift
      - path: StatusGalacticWidget/WidgetConfig.swift
    dependencies:
      - target: StatusGalacticWidget
      - package: SwiftProtobuf
    info:
      path: StatusGalactic/App/Info.plist
      properties:
        CFBundleDisplayName: Galactic
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        NSLocationWhenInUseUsageDescription: >-
          Spacetrucker Galactic uses your location to build a Galactic Weather Report
          for where you are right now.
        NSBluetoothAlwaysUsageDescription: >-
          StatusGalactic uses Bluetooth to connect to your Meshtastic node and
          exchange mesh messages.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            srvr.aprs-is.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            tgftp.nws.noaa.gov:
              NSExceptionAllowsInsecureHTTPLoads: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - FiraCode-Regular.ttf
          - FiraCode-Medium.ttf
          - FiraCode-SemiBold.ttf
          - FiraCode-Bold.ttf
          - FiraCode-Light.ttf
          - FiraCode-Retina.ttf
    settings:
      base:
        # iPhone-only at launch — flip back to "1,2" when the dedicated
        # iPad UI lands so the App Store listing picks up the iPad slot.
        # The SwiftUI views already compile for iPad; the deferral is
        # purely so we don't ship iPhone-stretched chrome.
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.spacetrucker.statusgalactic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: StatusGalactic/StatusGalactic.entitlements

  StatusGalacticWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StatusGalactic/Models/Brief.swift
      - path: StatusGalactic/Services/ClientConfig.swift
      - path: StatusGalactic/Services/GalacticPalette.swift
      - path: StatusGalactic/Services/Typography.swift
      - path: StatusGalactic/Services/Brief
      - path: StatusGalactic/Services/Astronomy
      - path: StatusGalactic/Resources/Fonts
      - path: StatusGalacticWidget
    info:
      path: StatusGalacticWidget/Info.plist
      properties:
        CFBundleDisplayName: Galactic
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIAppFonts:
          - FiraCode-Regular.ttf
          - FiraCode-Medium.ttf
          - FiraCode-SemiBold.ttf
          - FiraCode-Bold.ttf
          - FiraCode-Light.ttf
          - FiraCode-Retina.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spacetrucker.statusgalactic.widget
        # Mirror the main app — flip to "1,2" together when iPad lands.
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: StatusGalacticWidget/StatusGalacticWidget.entitlements

  StatusGalacticWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: StatusGalactic/Models/Brief.swift
      - path: StatusGalactic/Services/ClientConfig.swift
      - path: StatusGalactic/Services/LocationManager.swift
      - path: StatusGalactic/Services/Brief
      - path: StatusGalactic/Services/Astronomy
      - path: StatusGalacticWatch
    info:
      path: StatusGalacticWatch/Info.plist
      properties:
        CFBundleDisplayName: Galactic
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKWatchOnly: true
        NSLocationWhenInUseUsageDescription: >-
          Spacetrucker Galactic uses your location to build a Galactic Weather Report
          for where you are right now.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spacetrucker.statusgalactic.watch
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: StatusGalacticWatch/StatusGalacticWatch.entitlements
    dependencies:
      - target: StatusGalacticWatchComplications

  StatusGalacticWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: StatusGalactic/Models/Brief.swift
      - path: StatusGalactic/Services/ClientConfig.swift
      - path: StatusGalactic/Services/Brief
      - path: StatusGalactic/Services/Astronomy
      - path: StatusGalacticWatchComplications
    info:
      path: StatusGalacticWatchComplications/Info.plist
      properties:
        CFBundleDisplayName: Galactic
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spacetrucker.statusgalactic.watch.complications
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: StatusGalacticWatchComplications/StatusGalacticWatchComplications.entitlements

  StatusGalacticTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StatusGalacticTests
    dependencies:
      - target: StatusGalactic
      # Mesh fakes/fixtures reference Meshtastic_* protobuf types directly,
      # so the test target needs the SwiftProtobuf module too.
      - package: SwiftProtobuf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spacetrucker.statusgalactic.tests
        GENERATE_INFOPLIST_FILE: YES

  StatusGalacticUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StatusGalacticUITests
      # Shared with the main app so UI tests reference the same
      # accessibility-identifier constants the views set.
      - path: StatusGalactic/Support/AccessibilityIdentifiers.swift
    dependencies:
      - target: StatusGalactic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spacetrucker.statusgalactic.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: StatusGalactic

# Explicit shared schemes. Order here = order in Xcode's scheme dropdown.
# StatusGalactic (iOS app) is first so it's the default when the project
# is opened fresh.
schemes:
  StatusGalactic:
    build:
      targets:
        StatusGalactic: all
        StatusGalacticWidget: all
        StatusGalacticTests: [test]
        StatusGalacticUITests: [test]
    test:
      targets:
        - StatusGalacticTests
        - StatusGalacticUITests
      gatherCoverageData: false
    run:
      config: Debug
      executable: StatusGalactic
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

  StatusGalacticWatch:
    build:
      targets:
        StatusGalacticWatch: all
        StatusGalacticWatchComplications: all
    run:
      config: Debug
      executable: StatusGalacticWatch
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
